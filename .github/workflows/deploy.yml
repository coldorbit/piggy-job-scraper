name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  WATCH_SERVICES: >-
    jobright-watch
    jobright-ca-watch
    builtin-watch
    remotehunter-watch
    hiringcafe-watch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.name }}:buildcache,mode=max

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -p "$EC2_SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copy Compose file to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p '$EC2_DEPLOY_PATH'"
          scp -i ~/.ssh/ec2_deploy_key -P "$EC2_SSH_PORT" docker-compose.yml "$EC2_USER@$EC2_HOST:$EC2_DEPLOY_PATH/docker-compose.yml"

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SCRAPER_IMAGE: ${{ steps.image.outputs.name }}:${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_DEPLOY_PATH' \
              && echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin \
              && SCRAPER_IMAGE='$SCRAPER_IMAGE' docker compose pull $WATCH_SERVICES \
              && SCRAPER_IMAGE='$SCRAPER_IMAGE' docker compose up -d --remove-orphans $WATCH_SERVICES \
              && docker image prune -f"
