x-scraper-image: &scraper_image ${SCRAPER_IMAGE:-sites-scraper:local}

services:
  jobright-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/jobright/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
      - --max-scrolls
      - ${JOBRIGHT_MAX_SCROLLS:-30}
    env_file:
      - .env
    volumes:
      - ./.auth:/app/.auth:ro
    restart: unless-stopped
    init: true

  linkedin-watch:
    image: *scraper_image
    build: .
    command:
      - sh
      - -c
      - >
        node scripts/backfill-linkedin-apply-mode.js
        --last-24-hours
        --concurrency "${LINKEDIN_BACKFILL_CONCURRENCY:-6}"
        --timeout-ms "${LINKEDIN_BACKFILL_TIMEOUT_MS:-20000}"
        && node sites/linkedin/scraper.js
        --watch
        --watch-interval-minutes "${WATCH_INTERVAL_MINUTES:-5}"
    env_file:
      - .env
    restart: unless-stopped
    init: true

  builtin-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/builtin/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    restart: unless-stopped
    init: true

  simplify-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/simplify/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    restart: unless-stopped
    init: true

  diversityjobs-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/diversityjobs/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    restart: unless-stopped
    init: true

  remoteyeah-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/remoteyeah/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    restart: unless-stopped
    init: true

  remotehunter-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/remotehunter/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
      - --max-scrolls
      - ${REMOTEHUNTER_MAX_SCROLLS:-10}
    env_file:
      - .env
    restart: unless-stopped
    init: true

  hiringcafe-watch:
    image: *scraper_image
    build: .
    command:
      - node
      - sites/hiringcafe/scraper.js
      - --watch
      - --watch-interval-minutes
      - ${WATCH_INTERVAL_MINUTES:-5}
    env_file:
      - .env
    restart: unless-stopped
    init: true

  scrape:
    image: *scraper_image
    build: .
    command:
      - sh
      - -c
      - >
        node sites/jobright/scraper.js --max-scrolls "${JOBRIGHT_MAX_SCROLLS:-30}"
        && node sites/linkedin/scraper.js
        && node sites/builtin/scraper.js
        && node sites/simplify/scraper.js
        && node sites/diversityjobs/scraper.js
        && node sites/remoteyeah/scraper.js
        && node sites/remotehunter/scraper.js --max-scrolls "${REMOTEHUNTER_MAX_SCROLLS:-10}"
        && node sites/hiringcafe/scraper.js
    env_file:
      - .env
    volumes:
      - ./.auth:/app/.auth:ro
    profiles:
      - manual
    init: true
